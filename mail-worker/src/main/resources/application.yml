spring:
  application:
    name: mail-worker
  main:
    web-application-type: none
  datasource:
    # Same shared Postgres instance as mail-api (see mail-api/application.yml).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/maildb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:maildb}
    password: ${DB_PASSWORD:maildb}
  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway (infra: db/migration)
    open-in-view: false
  mail:
    # Dev default is MailHog; production points at the real SMTP relay.
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        prefetch: 10
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2.0
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # BounceService (webhook path runs in api, but worker shares infra) publishes JSON too.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # Projection consumer: mail.events -> email_events read model.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: io.github.ahrimjang.mail.common
        spring.json.value.default.type: io.github.ahrimjang.mail.common.EmailEventMessage

mail:
  sender:
    type: ${MAIL_SENDER_TYPE:smtp}

app:
  # Public base URL baked into tracking/unsubscribe links — MUST be the externally
  # reachable address in production, or recipients' opens/clicks dead-end.
  base-url: ${APP_BASE_URL:http://localhost:8080}
