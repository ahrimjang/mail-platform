spring:
  application:
    name: mail-worker
  main:
    web-application-type: none
  datasource:
    # Same shared H2 queue as mail-api (see mail-api/application.yml).
    url: jdbc:h2:file:./data/maildb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

mail:
  sender:
    type: smtp
  worker:
    # Max mails drained per tick, and how often to poll the queue.
    batch-size: 50
    poll-interval-ms: 2000

app:
  base-url: http://localhost:8080
