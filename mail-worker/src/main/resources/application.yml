spring:
  application:
    name: mail-worker
  main:
    web-application-type: none
  datasource:
    # Same shared Postgres instance as mail-api (see mail-api/application.yml).
    url: jdbc:postgresql://localhost:5432/maildb
    driver-class-name: org.postgresql.Driver
    username: maildb
    password: maildb
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        prefetch: 10
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2.0
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # BounceService (webhook path runs in api, but worker shares infra) publishes JSON too.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # Projection consumer: mail.events -> email_events read model.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: io.github.ahrimjang.mail.common
        spring.json.value.default.type: io.github.ahrimjang.mail.common.EmailEventMessage

mail:
  sender:
    type: smtp

app:
  base-url: http://localhost:8080
