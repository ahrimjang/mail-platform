<svg viewBox="0 0 960 1030" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>이메일 발송 파이프라인 (RabbitMQ 구조)</title>
  <desc>mail-api가 메시지를 H2에 저장하고 RabbitMQ 익스체인지로 발행하면, mail.send.queue에 쌓인 작업을 mail-worker가 @RabbitListener로 push 수신해 dispatchOne으로 한 건씩 발송(SMTP→MailHog)하고 상태를 H2에 기록한다. 실패는 DLQ로 격리되고, 수신자의 오픈/클릭은 이벤트로 집계된다.</desc>

  <defs>
    <marker id="mI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7F77DD"/></marker>
    <marker id="mG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#888780"/></marker>
    <marker id="mO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#C2570C"/></marker>
    <marker id="mT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#0F6E56"/></marker>
  </defs>

  <style>
    text { font-family: -apple-system, system-ui, "Malgun Gothic", sans-serif; }
    .h1  { font-size:19px; font-weight:700; fill:#26215C; }
    .lbl { font-size:12px; fill:#2C2C2A; font-family: ui-monospace, "Consolas", monospace; }
    .sub { font-size:9.5px; fill:#5F5E5A; }
    .tag { font-size:11px; font-weight:700; fill:#7F5A0B; letter-spacing:.03em; }
    .el  { font-size:9.5px; fill:#5F5E5A; }
    .fI  { stroke:#7F77DD; stroke-width:1.6; fill:none; }
    .fG  { stroke:#888780; stroke-width:1.4; fill:none; }
    .fO  { stroke:#C2570C; stroke-width:1.5; fill:none; }
    .fT  { stroke:#0F6E56; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="960" height="1030" fill="#ffffff"/>
  <text x="40" y="38" class="h1">이메일 발송 파이프라인 — RabbitMQ 구조</text>

  <g transform="translate(690,58)">
    <rect x="0" y="-9" width="12" height="12" rx="3" fill="none" stroke="#7F77DD" stroke-width="1.8"/><text x="17" y="1" class="sub">앱 컴포넌트</text>
    <rect x="0" y="9" width="12" height="12" rx="3" fill="none" stroke="#C2570C" stroke-width="1.8"/><text x="17" y="19" class="sub">RabbitMQ</text>
    <rect x="120" y="-9" width="12" height="12" rx="3" fill="none" stroke="#0F6E56" stroke-width="1.8"/><text x="137" y="1" class="sub">H2 저장소</text>
    <line x1="120" y1="15" x2="150" y2="15" class="fI"/><text x="155" y="19" class="sub">흐름</text>
  </g>

  <rect x="690" y="128" width="240" height="560" rx="12" fill="#ffffff" stroke="#0F6E56" stroke-width="1.8"/>
  <text x="810" y="152" text-anchor="middle" class="lbl" fill="#0F6E56">H2 · 상태 저장소</text>
  <text x="810" y="168" text-anchor="middle" class="sub">큐 아님 — 상태·토큰·지표의 원천</text>
  <g class="sub" fill="#2C2C2A">
    <rect x="708" y="186" width="204" height="34" rx="6" fill="none" stroke="#B4B2A9"/><text x="718" y="207" class="lbl" font-size="11">campaign</text>
    <rect x="708" y="230" width="204" height="46" rx="6" fill="none" stroke="#B4B2A9"/><text x="718" y="249" class="lbl" font-size="11">mail_message</text><text x="718" y="266" class="sub">status · unsub/track 토큰</text>
    <rect x="708" y="286" width="204" height="34" rx="6" fill="none" stroke="#B4B2A9"/><text x="718" y="307" class="lbl" font-size="11">email_event (OPEN/CLICK)</text>
    <rect x="708" y="330" width="204" height="34" rx="6" fill="none" stroke="#B4B2A9"/><text x="718" y="351" class="lbl" font-size="11">suppression</text>
  </g>
  <text x="810" y="392" text-anchor="middle" class="sub">↑ 지표(sent/opened/…)는 여기서 집계</text>

  <rect x="140" y="60" width="300" height="46" rx="9" fill="#ffffff" class="fI"/>
  <text x="290" y="80" text-anchor="middle" class="lbl">POST /api/campaigns</text>
  <text x="290" y="96" text-anchor="middle" class="sub">JWT 필요 · 즉시 201 반환</text>
  <line x1="290" y1="106" x2="290" y2="130" class="fI" marker-end="url(#mI)"/>

  <rect x="140" y="130" width="300" height="50" rx="9" fill="#ffffff" class="fI"/>
  <text x="290" y="150" text-anchor="middle" class="lbl">CampaignService.create()</text>
  <text x="290" y="167" text-anchor="middle" class="sub">① DB에 저장   ② 큐에 발행</text>
  <path d="M440 150 C 560 150, 590 200, 690 205" class="fT" marker-end="url(#mT)"/>
  <text x="560" y="140" class="el">① MailMessage 저장 (PENDING)</text>
  <line x1="290" y1="180" x2="290" y2="204" class="fI" marker-end="url(#mI)"/>

  <rect x="140" y="204" width="300" height="46" rx="9" fill="#ffffff" class="fI"/>
  <text x="290" y="224" text-anchor="middle" class="lbl">RabbitMailQueue.enqueue()</text>
  <text x="290" y="240" text-anchor="middle" class="sub">② SendJob(messageId) 발행</text>
  <line x1="290" y1="250" x2="290" y2="286" class="fI" marker-end="url(#mO)"/>

  <rect x="120" y="272" width="470" height="150" rx="12" fill="none" stroke="#C2570C" stroke-dasharray="2 4" opacity="0.6"/>
  <text x="132" y="288" class="tag">RabbitMQ (발송 큐 · 전송 담당)</text>

  <rect x="170" y="298" width="240" height="40" rx="9" fill="#ffffff" class="fO"/>
  <text x="290" y="323" text-anchor="middle" class="lbl">mail.exchange (direct)</text>
  <line x1="290" y1="338" x2="290" y2="366" class="fO" marker-end="url(#mO)"/>
  <text x="300" y="356" class="el">routing key: mail.send</text>

  <rect x="170" y="366" width="240" height="40" rx="9" fill="#ffffff" class="fO"/>
  <text x="290" y="391" text-anchor="middle" class="lbl">mail.send.queue (durable)</text>
  <line x1="410" y1="386" x2="454" y2="386" class="fO" marker-end="url(#mO)" stroke-dasharray="4 3"/>
  <rect x="454" y="366" width="126" height="40" rx="9" fill="#ffffff" stroke="#C2570C" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="517" y="385" text-anchor="middle" class="lbl" font-size="10.5">mail.send.dlq</text>
  <text x="517" y="399" text-anchor="middle" class="sub">실패 격리(DLX)</text>

  <line x1="290" y1="406" x2="290" y2="440" class="fO" marker-end="url(#mI)"/>
  <text x="300" y="428" class="el">push (즉시 전달)</text>

  <rect x="140" y="440" width="300" height="46" rx="9" fill="#ffffff" class="fI"/>
  <text x="290" y="460" text-anchor="middle" class="lbl">MailSendListener</text>
  <text x="290" y="476" text-anchor="middle" class="sub">@RabbitListener(mail.send.queue)</text>
  <line x1="290" y1="486" x2="290" y2="512" class="fI" marker-end="url(#mI)"/>

  <rect x="86" y="506" width="548" height="392" rx="12" fill="none" stroke="#7F77DD" stroke-dasharray="2 4" opacity="0.55"/>
  <text x="98" y="524" class="tag" fill="#534AB7">dispatchOne(messageId) — 1건 처리 (mail-core)</text>

  <rect x="116" y="534" width="272" height="42" rx="9" fill="#ffffff" class="fG"/>
  <text x="252" y="553" text-anchor="middle" class="lbl">findById → PENDING? (멱등성)</text>
  <text x="252" y="568" text-anchor="middle" class="sub">이미 처리/재배달이면 skip</text>
  <line x1="388" y1="555" x2="424" y2="555" class="fG" marker-end="url(#mG)" stroke-dasharray="4 3"/>
  <rect x="424" y="534" width="150" height="42" rx="9" fill="#ffffff" stroke="#888780" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="499" y="559" text-anchor="middle" class="sub">skip (return)</text>
  <line x1="252" y1="576" x2="252" y2="600" class="fI" marker-end="url(#mI)"/>

  <rect x="116" y="600" width="272" height="42" rx="9" fill="#ffffff" class="fG"/>
  <text x="252" y="625" text-anchor="middle" class="lbl">suppression 체크</text>
  <line x1="388" y1="621" x2="424" y2="621" class="fG" marker-end="url(#mG)"/><text x="406" y="613" class="el">예</text>
  <rect x="424" y="600" width="150" height="42" rx="9" fill="#ffffff" stroke="#888780" stroke-width="1.8"/>
  <text x="499" y="625" text-anchor="middle" class="lbl" font-size="11">SUPPRESSED</text>
  <line x1="252" y1="642" x2="252" y2="666" class="fI" marker-end="url(#mI)"/>

  <rect x="116" y="666" width="272" height="42" rx="9" fill="#ffffff" class="fI"/>
  <text x="252" y="685" text-anchor="middle" class="lbl">HTML 조립</text>
  <text x="252" y="701" text-anchor="middle" class="sub">링크재작성 + 수신거부푸터 + 오픈픽셀</text>
  <line x1="252" y1="708" x2="252" y2="732" class="fI" marker-end="url(#mI)"/>

  <rect x="116" y="732" width="196" height="42" rx="9" fill="#ffffff" class="fI"/>
  <text x="214" y="757" text-anchor="middle" class="lbl">MailSender.send()</text>
  <line x1="312" y1="753" x2="352" y2="753" class="fI" marker-end="url(#mI)"/><text x="332" y="746" class="el">SMTP</text>
  <rect x="352" y="732" width="222" height="42" rx="9" fill="#ffffff" stroke="#0F6E56" stroke-width="1.6"/>
  <text x="463" y="751" text-anchor="middle" class="lbl" font-size="11">SmtpMailSender → MailHog</text>
  <text x="463" y="766" text-anchor="middle" class="sub">외부 SMTP 서버 :1025</text>

  <line x1="190" y1="774" x2="190" y2="810" class="fI" marker-end="url(#mI)"/>
  <line x1="270" y1="774" x2="330" y2="810" class="fI" marker-end="url(#mI)"/>
  <rect x="116" y="810" width="130" height="40" rx="9" fill="#ffffff" stroke="#1D9E75" stroke-width="1.8"/>
  <text x="181" y="834" text-anchor="middle" class="lbl">SENT</text>
  <rect x="286" y="810" width="200" height="40" rx="9" fill="#ffffff" stroke="#D85A30" stroke-width="1.8"/>
  <text x="386" y="834" text-anchor="middle" class="lbl">BOUNCED + suppress</text>

  <line x1="181" y1="850" x2="181" y2="864" class="fI" marker-end="url(#mI)"/>
  <rect x="116" y="864" width="370" height="30" rx="9" fill="#ffffff" class="fI"/>
  <text x="301" y="884" text-anchor="middle" class="lbl" font-size="11">pending == 0 → Campaign COMPLETED</text>

  <path d="M634 700 C 670 700, 672 480, 690 460" class="fT" marker-end="url(#mT)"/>
  <text x="646" y="560" class="el" transform="rotate(90 646 560)">상태 읽기/쓰기</text>

  <!-- suppression example callout -->
  <rect x="690" y="704" width="240" height="192" rx="12" fill="#FFF8F1" stroke="#C2570C" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="704" y="726" class="tag" fill="#C2570C">억제(Suppression) 예시</text>
  <text x="704" y="748" class="lbl" font-size="11">① bad-addr (@ 없음)</text>
  <text x="712" y="764" class="sub">발송 실패 → BOUNCED → 억제 등록</text>
  <text x="712" y="778" class="sub">2차 캠페인에서 자동 SKIP</text>
  <text x="704" y="804" class="lbl" font-size="11">② bob 수신거부 클릭</text>
  <text x="712" y="820" class="sub">억제 등록 (reason=unsubscribe)</text>
  <text x="712" y="834" class="sub">재발송 때 sent 에서 제외</text>
  <line x1="704" y1="850" x2="916" y2="850" stroke="#E8DFD3"/>
  <text x="704" y="872" class="lbl" font-size="10.5" fill="#0F6E56">→ 30명 중 억제분 빼고 발송</text>

  <rect x="40" y="916" width="880" height="98" rx="12" fill="none" stroke="#B4B2A9" stroke-dasharray="3 5"/>
  <text x="52" y="936" class="tag" fill="#5F5E5A">비동기 추적 · 지표</text>

  <rect x="60" y="946" width="190" height="46" rx="9" fill="#ffffff" class="fG"/>
  <text x="155" y="965" text-anchor="middle" class="lbl" font-size="11">수신자: 오픈/클릭/수신거부</text>
  <text x="155" y="981" text-anchor="middle" class="sub">/api/track/**, /api/unsubscribe/**</text>
  <line x1="250" y1="969" x2="292" y2="969" class="fG" marker-end="url(#mG)"/>
  <rect x="292" y="946" width="220" height="46" rx="9" fill="#ffffff" class="fG"/>
  <text x="402" y="965" text-anchor="middle" class="lbl" font-size="11">EmailEvent · Suppression</text>
  <text x="402" y="981" text-anchor="middle" class="sub">DB에 기록</text>
  <path d="M512 960 C 600 950, 640 720, 690 470" class="fT" marker-end="url(#mT)"/>

  <rect x="590" y="946" width="150" height="46" rx="9" fill="#ffffff" class="fI"/>
  <text x="665" y="965" text-anchor="middle" class="lbl" font-size="11">frontend 폴링</text>
  <text x="665" y="981" text-anchor="middle" class="sub">GET /campaigns/{id}</text>
  <line x1="740" y1="969" x2="782" y2="969" class="fI" marker-end="url(#mI)"/>
  <rect x="782" y="946" width="150" height="46" rx="9" fill="#ffffff" class="fI"/>
  <text x="857" y="965" text-anchor="middle" class="lbl" font-size="11">CampaignView</text>
  <text x="857" y="981" text-anchor="middle" class="sub">sent/opened/clicked…</text>
</svg>
