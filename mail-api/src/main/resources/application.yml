spring:
  application:
    name: mail-api
  datasource:
    # Shared Postgres instance (docker compose) — mail-api/worker/admin all connect
    # to the same database as the state store.
    url: jdbc:postgresql://localhost:5432/maildb
    driver-class-name: org.postgresql.Driver
    username: maildb
    password: maildb
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # Engagement events (open/click/bounce) go out as JSON onto mail.events.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

app:
  jwt:
    secret: "change-me-in-prod-please-use-a-long-random-secret-key-0123456789"
    expiration-minutes: 120
  webhook:
    secret: dev-webhook-secret
