spring:
  application:
    name: mail-api
  mail:
    # Test sends ("내게 먼저 보내기") go out synchronously from the API — same
    # dev default (MailHog) and overrides as the worker's dispatch path.
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
  datasource:
    # Shared Postgres instance (docker compose) — mail-api/worker/admin all connect
    # to the same database as the state store. Defaults target local dev; override
    # via environment variables in production (see .env.example).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/maildb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:maildb}
    password: ${DB_PASSWORD:maildb}
  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway (infra: db/migration)
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # Engagement events (open/click/bounce) go out as JSON onto mail.events.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  servlet:
    multipart:
      # Template image uploads (UploadService re-validates at 5MB).
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 8080

# Prometheus scrape endpoint (/actuator/prometheus). The `application` tag keys
# every metric to its app so api/worker series don't collide in Grafana.
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: mail-api

app:
  jwt:
    # Dev-only fallback — production MUST set APP_JWT_SECRET (HS512 needs >= 64 bytes).
    secret: ${APP_JWT_SECRET:dev-only-not-a-real-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  webhook:
    # Shared secret bounce providers must echo in X-Webhook-Token.
    secret: ${APP_WEBHOOK_SECRET:dev-webhook-secret}
  uploads:
    # Local template-image storage; served publicly at /uploads/**.
    dir: ${APP_UPLOADS_DIR:uploads}

mail:
  sender:
    type: ${MAIL_SENDER_TYPE:smtp}
