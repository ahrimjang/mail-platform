# 로컬 개발 인프라 (앱 제외) — Postgres + RabbitMQ + Kafka + MailHog
#
# 우리 Spring 앱(mail-api/worker/admin)은 여기 없습니다. 앱은 ./gradlew bootRun 으로 직접 실행하고,
# 이 파일은 그 앱들이 의존하는 "핵심 외부 서버"만 기성 이미지로 띄웁니다:
#   상태 저장소(Postgres) + 발송 작업큐(RabbitMQ) + 이벤트 스트림(Kafka) + 개발용 SMTP(MailHog)
# 로그 관측 스택(OpenSearch/Dashboards/Fluent Bit)은 감시하는 쪽 프로젝트
# (../opensearch-log-analysis-backend)의 compose 가 소유합니다 — 여기 앱들은 ./logs 에 파일만 씁니다.
#
#   실행:  docker compose up -d
#   중지:  docker compose down          (데이터 유지)
#   초기화: docker compose down -v       (Postgres/RabbitMQ/Kafka 볼륨까지 삭제 — 전체 리셋)
#
#   Postgres         : localhost:5432  (maildb / maildb / maildb)
#   RabbitMQ 관리 UI : http://localhost:15672   (guest / guest)
#   Kafka            : localhost:9092  (mail.events 토픽 — 오픈/클릭/바운스 이벤트 스트림)
#   Kafka UI         : http://localhost:8088  (토픽·메시지·소비자 그룹·LAG 웹 콘솔)
#   MailHog 받은편지함: http://localhost:8025
#   Prometheus       : http://localhost:9090  (api/worker/actuator + RabbitMQ 수집)
#   Grafana          : http://localhost:3000  (익명 열람 — "메일 플랫폼" 대시보드 프로비저닝됨)

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"      # mail-api/worker/admin 이 여기로 접속(공유 상태 저장소)
    environment:
      POSTGRES_DB: maildb
      POSTGRES_USER: maildb
      POSTGRES_PASSWORD: maildb
    volumes:
      - postgres-data:/var/lib/postgresql/data   # 컨테이너 재시작 후에도 데이터 유지
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maildb -d maildb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"      # AMQP — 앱(mail-api 발행 / mail-worker 소비)이 접속
      - "15672:15672"    # 관리 UI (웹)
      - "15692:15692"    # rabbitmq_prometheus 플러그인 — Prometheus 가 큐 지표를 긁어감
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq   # durable 큐/메시지가 재시작 후에도 유지되도록
      # 관리 UI + prometheus 플러그인 활성화 (이미지 기본은 management 만)
      - ./monitoring/rabbitmq_enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 참여 이벤트(오픈/클릭/바운스) 스트림 — RabbitMQ(작업큐: 1회 소비/ack/DLQ)와 역할이 다릅니다.
  # Kafka 는 append-only 로그라 여러 소비자가 각자 오프셋으로 재생(replay)할 수 있습니다.
  # 단일 노드 KRaft(주키퍼 없음). 리스너 2개: 호스트의 앱(bootRun)은 localhost:9092,
  # 컨테이너(kafka-ui 등)는 kafka:29092 로 접속합니다.
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    ports:
      - "9092:9092"      # 앱(mail-api 발행 / mail-worker 프로젝션 소비)이 접속
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data   # 이벤트 로그가 재시작 후에도 유지되도록
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"      # SMTP — mail-worker 의 SmtpMailSender 가 여기로 발송
      - "8025:8025"      # 웹 UI — 발송된 메일 확인
    # MailHog 는 메일을 메모리에 담는 개발용이라 별도 볼륨이 필요 없습니다.

  # Kafka 웹 콘솔 — 토픽·메시지·소비자 그룹·LAG 을 눈으로 (RabbitMQ 관리 UI의 Kafka 판)
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mail-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092   # 컨테이너용 내부 리스너
      DYNAMIC_CONFIG_ENABLED: "false"
    depends_on:
      kafka:
        condition: service_healthy

  # ── 메트릭 스택 (Micrometer → Prometheus → Grafana) ──────────────────
  # 앱들은 /actuator/prometheus 로 지표를 내놓기만 하고(호스트에서 bootRun),
  # 수집·저장·시각화는 전부 여기 두 컨테이너가 맡습니다.
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 호스트에서 도는 api(:8080)/worker(:8082) 스크레이프용

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # 개발 편의: 로그인 없이 열람 (운영에서는 반드시 제거)
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  rabbitmq-data:
  kafka-data:
