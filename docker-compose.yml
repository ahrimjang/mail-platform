# 로컬 개발 인프라 (앱 제외) — Postgres + RabbitMQ + MailHog
#
# 우리 Spring 앱(mail-api/worker/admin)은 여기 없습니다. 앱은 ./gradlew bootRun 으로 직접 실행하고,
# 이 파일은 그 앱들이 의존하는 "핵심 외부 서버"만 기성 이미지로 띄웁니다:
#   상태 저장소(Postgres) + 발송 작업큐(RabbitMQ) + 개발용 SMTP(MailHog)
# 로그 관측 스택(OpenSearch/Dashboards/Fluent Bit)은 감시하는 쪽 프로젝트
# (../opensearch-log-analysis-backend)의 compose 가 소유합니다 — 여기 앱들은 ./logs 에 파일만 씁니다.
#
#   실행:  docker compose up -d
#   중지:  docker compose down          (데이터 유지)
#   초기화: docker compose down -v       (Postgres/RabbitMQ 볼륨까지 삭제 — 전체 리셋)
#
#   Postgres         : localhost:5432  (maildb / maildb / maildb)
#   RabbitMQ 관리 UI : http://localhost:15672   (guest / guest)
#   MailHog 받은편지함: http://localhost:8025

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"      # mail-api/worker/admin 이 여기로 접속(공유 상태 저장소)
    environment:
      POSTGRES_DB: maildb
      POSTGRES_USER: maildb
      POSTGRES_PASSWORD: maildb
    volumes:
      - postgres-data:/var/lib/postgresql/data   # 컨테이너 재시작 후에도 데이터 유지
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maildb -d maildb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"      # AMQP — 앱(mail-api 발행 / mail-worker 소비)이 접속
      - "15672:15672"    # 관리 UI (웹)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq   # durable 큐/메시지가 재시작 후에도 유지되도록
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"      # SMTP — mail-worker 의 SmtpMailSender 가 여기로 발송
      - "8025:8025"      # 웹 UI — 발송된 메일 확인
    # MailHog 는 메일을 메모리에 담는 개발용이라 별도 볼륨이 필요 없습니다.

volumes:
  postgres-data:
  rabbitmq-data:
