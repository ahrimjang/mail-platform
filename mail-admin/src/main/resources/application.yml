spring:
  application:
    name: mail-admin
  datasource:
    # Same shared Postgres instance as mail-api (see mail-api/application.yml).
    url: jdbc:postgresql://localhost:5432/maildb
    driver-class-name: org.postgresql.Driver
    username: maildb
    password: maildb
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8081
