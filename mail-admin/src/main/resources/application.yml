spring:
  application:
    name: mail-admin
  datasource:
    # Same shared H2 queue as mail-api (see mail-api/application.yml).
    url: jdbc:h2:file:./data/maildb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8081
