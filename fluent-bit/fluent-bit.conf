[SERVICE]
    Flush            1
    Log_Level        info
    Parsers_File      parsers.conf
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

# mail-api / mail-worker / mail-admin 이 호스트에 쓰는 JSON 로그 파일(./logs/*.json.log)을
# 컨테이너에 읽기전용으로 마운트해 tail 합니다 (앱은 컨테이너 밖, 호스트에서 bootRun 으로 실행).
[INPUT]
    Name              tail
    Path              /var/log/mail-platform/*.json.log
    Path_Key          source_file
    Tag               mail.<file_name>
    Parser            json
    Refresh_Interval  5
    DB                /fluent-bit/db/tail.db

[OUTPUT]
    Name              opensearch
    Match             mail.*
    Host              opensearch
    Port              9200
    Index             mail-platform-logs
    Logstash_Format   On
    Logstash_Prefix   mail-platform-logs
    Logstash_DateFormat %Y.%m.%d
    Suppress_Type_Name On
    Replace_Dots      On
    Retry_Limit       False
