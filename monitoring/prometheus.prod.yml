# 프로드(컨테이너) 수집 대상 — 앱도 컨테이너라 서비스명으로 접근한다.
# (개발용 prometheus.yml 은 호스트에서 도는 bootRun 을 host.docker.internal 로 긁는다.)
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: mail-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api:8080"]

  - job_name: mail-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["worker:8082"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: rabbitmq-queues
    metrics_path: /metrics/detailed
    params:
      family: [queue_coarse_metrics]
    static_configs:
      - targets: ["rabbitmq:15692"]
